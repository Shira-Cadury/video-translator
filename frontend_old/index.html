<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <title>My Translator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Video Translator</h1>
        <input id="urlInput" placeholder="Paste link here">
        <button id="sumBtn">Start working!</button>

        <div id="status"></div>

        <div id="videoContainer" style="display:none; margin-top: 20px; text-align: center;">
            <h2>"The translated video"</h2>
            <video id="videoPlayer" controls width="100%" style="max-width: 700px; border-radius: 12px; border: 2px solid #333; background: #000;">
                <source id="videoSource" src="" type="video/mp4">
                <track id="subtitleTrack" kind="subtitles" srclang="he" label="עברית" default>
            </video>
        </div>

        <h2>Hebrew Summary</h2>
        <div id="summary_he"></div>

        <h2>English Summary</h2>
        <div id="summary_en"></div>

        <div id="downloads"></div>

        <script src="script.js"></script>
    </body>
</html>
